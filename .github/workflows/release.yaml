name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Charts
        run: |
          for chart_dir in */; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            helm lint "$chart_dir"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        id: release
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: .
          pages_branch: master
          packages_with_index: true
          skip_existing: true

      - name: Login to GHCR
        if: steps.release.outputs.changed_charts != '' || vars.OCI_FULL_SYNC == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to OCI (new charts only)
        if: steps.release.outputs.changed_charts != '' && vars.OCI_FULL_SYNC != 'true'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY="oci://ghcr.io/${OWNER,,}/helm-charts"
          for tgz in .cr-release-packages/*.tgz; do
            filename=$(basename "$tgz" .tgz)
            chart_name=$(echo "$filename" | sed 's/-[0-9].*//')
            chart_version=$(echo "$filename" | sed 's/.*-\([0-9].*\)/\1/')
            if helm show chart "${REGISTRY}/${chart_name}" --version "$chart_version" &>/dev/null; then
              echo "Skip ${chart_name}:${chart_version} (already in registry)"
              continue
            fi
            echo "Pushing ${chart_name}:${chart_version}"
            helm push "$tgz" "${REGISTRY}"
          done

      - name: Push to OCI (full sync)
        if: vars.OCI_FULL_SYNC == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY="oci://ghcr.io/${OWNER,,}/helm-charts"
          for tgz in charts/*.tgz; do
            filename=$(basename "$tgz" .tgz)
            chart_name=$(echo "$filename" | sed 's/-[0-9].*//')
            chart_version=$(echo "$filename" | sed 's/.*-\([0-9].*\)/\1/')
            if helm show chart "${REGISTRY}/${chart_name}" --version "$chart_version" &>/dev/null; then
              echo "Skip ${chart_name}:${chart_version} (already in registry)"
              continue
            fi
            echo "Pushing ${chart_name}:${chart_version}"
            helm push "$tgz" "${REGISTRY}"
          done
