name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master

jobs:
  release:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push new chart versions
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY="oci://ghcr.io/${OWNER,,}/helm-charts"
          mkdir -p /tmp/charts
          for chart_dir in */; do
            [ -f "${chart_dir}Chart.yaml" ] || continue

            chart_name=$(basename "$chart_dir")
            chart_version=$(grep '^version:' "${chart_dir}Chart.yaml" | awk '{print $2}' | tr -d '"')

            if helm show chart "${REGISTRY}/${chart_name}" \
                --version "$chart_version" &>/dev/null; then
              echo "Skip ${chart_name}:${chart_version} (already in registry)"
              continue
            fi

            echo "Pushing ${chart_name}:${chart_version}"
            helm package "$chart_dir" --destination /tmp/charts/
            helm push "/tmp/charts/${chart_name}-${chart_version}.tgz" "${REGISTRY}"
          done
