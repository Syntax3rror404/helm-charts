name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Charts
        run: |
          for chart_dir in */; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            helm lint "$chart_dir"
          done

      - name: Package new chart versions
        id: package
        run: |
          new_packages=()
          new_tgz=()
          for chart_dir in */; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            chart_name=$(grep '^name:' "${chart_dir}Chart.yaml" | awk '{print $2}')
            chart_version=$(grep '^version:' "${chart_dir}Chart.yaml" | awk '{print $2}')
            tgz="charts/${chart_name}-${chart_version}.tgz"
            if [ ! -f "$tgz" ]; then
              echo "Packaging ${chart_name}-${chart_version}..."
              helm package "$chart_dir" -d charts/
              new_packages+=("${chart_name}-${chart_version}")
              new_tgz+=("$tgz")
            fi
          done

          if [ ${#new_packages[@]} -eq 0 ]; then
            echo "No new chart versions."
            echo "changed=" >> "$GITHUB_OUTPUT"
          else
            helm repo index charts/ --merge charts/index.yaml
            git add charts/
            git commit -m "Publishing chart packages: $(IFS=', '; echo "${new_packages[*]}")"
            git push
            echo "changed=$(IFS=','; echo "${new_packages[*]}")" >> "$GITHUB_OUTPUT"
            echo "new_tgz=$(IFS=','; echo "${new_tgz[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.package.outputs.changed != '' || vars.OCI_FULL_SYNC == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to OCI (new charts only)
        if: steps.package.outputs.changed != '' && vars.OCI_FULL_SYNC != 'true'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY="oci://ghcr.io/${OWNER,,}/helm-charts"
          for tgz in $(echo "${{ steps.package.outputs.new_tgz }}" | tr ',' ' '); do
            filename=$(basename "$tgz" .tgz)
            chart_name=$(echo "$filename" | sed 's/-[0-9].*//')
            chart_version=$(echo "$filename" | sed 's/.*-\([0-9].*\)/\1/')
            if helm show chart "${REGISTRY}/${chart_name}" --version "$chart_version" &>/dev/null; then
              echo "Skip ${chart_name}:${chart_version} (already in registry)"
              continue
            fi
            echo "Pushing ${chart_name}:${chart_version}"
            helm push "$tgz" "${REGISTRY}"
          done

      - name: Push to OCI (full sync)
        if: vars.OCI_FULL_SYNC == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY="oci://ghcr.io/${OWNER,,}/helm-charts"
          for tgz in charts/*.tgz; do
            filename=$(basename "$tgz" .tgz)
            chart_name=$(echo "$filename" | sed 's/-[0-9].*//')
            chart_version=$(echo "$filename" | sed 's/.*-\([0-9].*\)/\1/')
            if helm show chart "${REGISTRY}/${chart_name}" --version "$chart_version" &>/dev/null; then
              echo "Skip ${chart_name}:${chart_version} (already in registry)"
              continue
            fi
            echo "Pushing ${chart_name}:${chart_version}"
            helm push "$tgz" "${REGISTRY}"
          done
