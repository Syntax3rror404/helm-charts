---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "minecraft.fullname" . }}-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
data:
  {{- if .Values.neoforge.enabled }}
  download-neoforge-installer.sh: |
    #!/bin/sh
    set -eu

    VERSION_FILE="/data/.neoforge-version"
    INSTALLER_JAR="/data/neoforge-installer.jar"

    # Re-download if the installed version doesn't match the requested version.
    # This catches upgrades and downgrades automatically.
    INSTALLED_VERSION=""
    if [ -f "${VERSION_FILE}" ]; then
      INSTALLED_VERSION=$(cat "${VERSION_FILE}")
    fi

    if [ "${INSTALLED_VERSION}" = "${NEOFORGE_VERSION}" ]; then
      echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping download."
    else
      echo "==> Version mismatch (installed='${INSTALLED_VERSION}', want='${NEOFORGE_VERSION}'). Downloading installer..."
      curl \
        --silent --show-error --fail --location \
        --retry 5 --retry-delay 5 \
        --connect-timeout 30 --max-time 300 \
        --output "${INSTALLER_JAR}" \
        "${INSTALLER_URL}"
      # Print checksum for auditability in pod logs
      echo "==> Download complete. SHA256: $(sha256sum ${INSTALLER_JAR})"
    fi

  install-neoforge.sh: |
    #!/bin/sh
    set -eu

    INSTALLER_JAR="/data/neoforge-installer.jar"
    VERSION_FILE="/data/.neoforge-version"

    # Skip installation if the version file already matches (idempotent across restarts).
    INSTALLED_VERSION=""
    if [ -f "${VERSION_FILE}" ]; then
      INSTALLED_VERSION=$(cat "${VERSION_FILE}")
    fi

    if [ "${INSTALLED_VERSION}" = "${NEOFORGE_VERSION}" ]; then
      echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping."
    else
      echo "==> Running NeoForge ${NEOFORGE_VERSION} installer (replacing '${INSTALLED_VERSION}')..."
      cd /data
      # --installServer installs the server libraries and generates run.sh
      java -jar "${INSTALLER_JAR}" --installServer . 2>&1
      # Cleanup: remove the installer jar to save disk space
      rm -f "${INSTALLER_JAR}"
      # Write the version sentinel so future restarts are skipped
      echo "${NEOFORGE_VERSION}" > "${VERSION_FILE}"
      echo "==> NeoForge ${NEOFORGE_VERSION} installation complete."
    fi

  {{- else }}
  download-jar.sh: |
    #!/bin/sh
    set -eu

    JAR="/data/{{ .Values.minecraft.jarFilename }}"
    VERSION_FILE="/data/.minecraft-jar-url"
    WANT_URL="{{ .Values.minecraft.jarUrl }}"

    # Re-download if the JAR URL changed (version upgrade) or the JAR is missing.
    INSTALLED_URL=""
    if [ -f "${VERSION_FILE}" ]; then
      INSTALLED_URL=$(cat "${VERSION_FILE}")
    fi

    if [ -f "${JAR}" ] && [ "${INSTALLED_URL}" = "${WANT_URL}" ]; then
      echo "==> Server JAR already present and up-to-date, skipping download."
    else
      echo "==> Downloading server JAR (url changed or JAR missing)..."
      curl \
        --silent --show-error --fail --location \
        --retry 5 --retry-delay 5 \
        --connect-timeout 30 --max-time 300 \
        --output "${JAR}" \
        "${WANT_URL}"
      # Print checksum for auditability in pod logs
      echo "==> Download complete. SHA256: $(sha256sum ${JAR})"
      # Write the URL sentinel so future restarts are skipped
      echo "${WANT_URL}" > "${VERSION_FILE}"
    fi

  {{- end }}

  init-config.sh: |
    #!/bin/sh
    set -eu

    # Copy server.properties from ConfigMap to the PVC on every start.
    # This ensures Helm value changes are applied even if the file already exists.
    echo "==> Syncing server.properties..."
    cp /config/server.properties /data/server.properties

    # Write eula.txt – Minecraft refuses to start without explicit EULA acceptance.
    echo "==> Writing eula.txt (eula={{ .Values.minecraft.eulaAccepted }})..."
    echo "eula={{ .Values.minecraft.eulaAccepted }}" > /data/eula.txt

    echo "==> Init done."

  start-server.sh: |
    #!/bin/sh
    set -eu

    FIFO="/tmp/mc-stdin"

    # Create a named pipe to allow writing commands into the server's stdin
    # (e.g. from the preStop hook). The FIFO persists in the shared /tmp emptyDir.
    echo "==> Creating command FIFO at ${FIFO}..."
    mkfifo "${FIFO}" 2>/dev/null || true

    {{- if .Values.neoforge.enabled }}
    # Start the NeoForge server via the generated run.sh script.
    # run.sh reads JVM args from /data/user_jvm_args.txt (mounted via subPath).
    echo "==> Starting NeoForge server via run.sh..."
    /bin/sh /data/run.sh < "${FIFO}" &
    {{- else }}
    # Start the vanilla Minecraft server directly with the configured JVM flags.
    echo "==> Starting Minecraft server..."
    java \
      {{ .Values.minecraft.jvmOpts }} \
      -jar "/data/{{ .Values.minecraft.jarFilename }}" \
      nogui < "${FIFO}" &
    {{- end }}

    MC_PID=$!

    # Keep fd 3 open so the FIFO never gets an EOF while the server is running.
    # Without this, the server would exit immediately after the first writer closes.
    exec 3>"${FIFO}"

    # Wait for the server process to exit and propagate its exit code
    wait ${MC_PID}
    EXIT_CODE=$?

    # Close fd 3 and exit with the server's exit code
    exec 3>&-
    exit ${EXIT_CODE}

  stop.sh: |
    #!/bin/sh

    # Warn players about the upcoming shutdown via in-game chat
    echo "say Kubernetes: Shutdown/Reboot scheduled in 10 seconds ..." > /tmp/mc-stdin
    sleep 1

    # Countdown from 9 to 1 with one-second intervals
    i=9
    while [ $i -gt 0 ]; do
      echo "say Kubernetes: $i" > /tmp/mc-stdin
      sleep 1
      i=$((i - 1))
    done

    # Send the stop command to trigger a clean server shutdown (world save etc.)
    echo "stop" > /tmp/mc-stdin

    # Wait for the remaining grace period so Kubernetes doesn't SIGKILL
    # before the server finishes saving. (-10 accounts for the countdown above)
    sleep {{ .Values.terminationGracePeriodSeconds | int | add -10 }}
