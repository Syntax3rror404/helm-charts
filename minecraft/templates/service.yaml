---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "minecraft.selectorLabels" . | nindent 4 }}
  ports:
    - name: minecraft
      port: 25565
      targetPort: minecraft
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "minecraft.selectorLabels" . | nindent 4 }}
  ports:
    - name: minecraft
      port: {{ .Values.service.port }}
      targetPort: minecraft
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.rcon.enabled }}
    - name: rcon
      port: {{ .Values.rcon.port }}
      targetPort: rcon
      protocol: TCP
    {{- end }}
