---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "minecraft.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "minecraft.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "minecraft.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.securityContext.pod | nindent 8 }}

      # ── Init Containers ────────────────────────────────────────────
      initContainers:

        {{- if .Values.neoforge.enabled }}
        # NeoForge 1/2: Download installer
        - name: download-neoforge-installer
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
            - name: INSTALLER_URL
              value: {{ include "minecraft.neoforgeInstallerUrl" . | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              SENTINEL="/data/run.sh"
              INSTALLER_JAR="/data/neoforge-installer.jar"

              if [ -f "${SENTINEL}" ]; then
                echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping download."
              else
                echo "==> Downloading NeoForge ${NEOFORGE_VERSION} installer..."
                curl \
                  --silent --show-error --fail --location \
                  --retry 5 --retry-delay 5 \
                  --connect-timeout 30 --max-time 300 \
                  --output "${INSTALLER_JAR}" \
                  "${INSTALLER_URL}"
                echo "==> Download complete. SHA256: $(sha256sum ${INSTALLER_JAR})"
              fi
          volumeMounts:
            - name: data
              mountPath: /data

        # NeoForge 2/2: Run installer
        - name: install-neoforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              INSTALLER_JAR="/data/neoforge-installer.jar"
              SENTINEL="/data/run.sh"

              if [ -f "${SENTINEL}" ]; then
                echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping."
              else
                echo "==> Running NeoForge installer..."
                cd /data
                java -jar "${INSTALLER_JAR}" --installServer . 2>&1
                rm -f "${INSTALLER_JAR}"
                echo "==> NeoForge installation complete."
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

        {{- else }}
        # Vanilla: download server.jar if not present
        - name: download-jar
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              JAR="/data/{{ .Values.minecraft.jarFilename }}"
              if [ -f "${JAR}" ]; then
                echo "==> Server JAR already present, skipping download."
              else
                echo "==> Downloading {{ .Values.minecraft.jarUrl }}..."
                curl \
                  --silent --show-error --fail --location \
                  --retry 5 --retry-delay 5 \
                  --connect-timeout 30 --max-time 300 \
                  --output "${JAR}" \
                  "{{ .Values.minecraft.jarUrl }}"
                echo "==> Download complete. SHA256: $(sha256sum ${JAR})"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        {{- end }}

        # Always: copy server.properties + write eula.txt
        # Both files are rewritten by the Minecraft server at runtime, so they
        # must live on the writable PVC – a read-only ConfigMap mount won't work.
        - name: init-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "==> Syncing server.properties..."
              cp /config/server.properties /data/server.properties
              echo "==> Writing eula.txt (eula={{ .Values.minecraft.eulaAccepted }})..."
              echo "eula={{ .Values.minecraft.eulaAccepted }}" > /data/eula.txt
              echo "==> Init done."
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      # ── Main Container ─────────────────────────────────────────────
      containers:
        - name: minecraft
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          {{- if .Values.neoforge.enabled }}
          command: ["/bin/sh", "/config/start-neoforge.sh"]
          {{- else }}
          command: ["/bin/sh", "/config/start.sh"]
          {{- end }}
          workingDir: /data
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "say Kubernetes System: Shutdown scheduled in 10 seconds ..." > /tmp/mc-stdin
                    sleep 1
                    i=9
                    while [ $i -gt 0 ]; do
                      echo "say Kubernetes System: $i" > /tmp/mc-stdin
                      sleep 1
                      i=$((i - 1))
                    done
                    echo "stop" > /tmp/mc-stdin
                    sleep {{ .Values.terminationGracePeriodSeconds | int | add -10 }}
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            {{- if .Values.rcon.enabled }}
            - name: rcon
              containerPort: {{ .Values.rcon.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.io.tmpdir=/tmp"
            {{- if .Values.rcon.enabled }}
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minecraft.rconSecretName" . }}
                  key: rcon-password
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.neoforge.enabled }}
            # Mount user_jvm_args.txt directly from ConfigMap into /data.
            # NeoForge's run.sh passes it to java via @user_jvm_args.txt – read-only is fine.
            - name: config
              mountPath: /data/user_jvm_args.txt
              subPath: user_jvm_args.txt
              readOnly: true
            {{- end }}

      # ── Volumes ────────────────────────────────────────────────────
      volumes:
        - name: config
          configMap:
            name: {{ include "minecraft.fullname" . }}-config
            defaultMode: 0444
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

  # ── Volume Claim Templates ──────────────────────────────────────────
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "minecraft.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
  # Persistence disabled – data lives in an emptyDir (lost on pod restart!)
  {{- end }}
