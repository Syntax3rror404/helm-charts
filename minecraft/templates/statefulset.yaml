---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "minecraft.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "minecraft.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "minecraft.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.securityContext.pod | nindent 8 }}

      ##-- Init Containers ##########################################──
      initContainers:

        {{- if .Values.neoforge.enabled }}
        # NeoForge 1/2: Download installer
        - name: download-neoforge-installer
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" true) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
            - name: INSTALLER_URL
              value: {{ include "minecraft.neoforgeInstallerUrl" . | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              SENTINEL="/data/run.sh"
              INSTALLER_JAR="/data/neoforge-installer.jar"

              # Skip download if NeoForge was already installed in a previous run.
              # run.sh is generated by the installer and serves as the sentinel file.
              if [ -f "${SENTINEL}" ]; then
                echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping download."
              else
                echo "==> Downloading NeoForge ${NEOFORGE_VERSION} installer..."
                curl \
                  --silent --show-error --fail --location \
                  --retry 5 --retry-delay 5 \
                  --connect-timeout 30 --max-time 300 \
                  --output "${INSTALLER_JAR}" \
                  "${INSTALLER_URL}"
                # Print checksum for auditability in pod logs
                echo "==> Download complete. SHA256: $(sha256sum ${INSTALLER_JAR})"
              fi
          volumeMounts:
            - name: data
              mountPath: /data

        # NeoForge 2/2: Run installer
        - name: install-neoforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" false) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.installResources | nindent 12 }}
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              INSTALLER_JAR="/data/neoforge-installer.jar"
              SENTINEL="/data/run.sh"

              # Skip installation if the sentinel already exists (idempotency across restarts)
              if [ -f "${SENTINEL}" ]; then
                echo "==> NeoForge ${NEOFORGE_VERSION} already installed, skipping."
              else
                echo "==> Running NeoForge installer..."
                cd /data
                # --installServer installs the server libraries and generates run.sh
                java -jar "${INSTALLER_JAR}" --installServer . 2>&1
                # Cleanup: remove the installer jar to save disk space
                rm -f "${INSTALLER_JAR}"
                echo "==> NeoForge installation complete."
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

        {{- else }}
        # Vanilla: download server.jar if not present
        - name: download-jar
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" true) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              JAR="/data/{{ .Values.minecraft.jarFilename }}"

              # Skip download if the JAR is already on the PVC (e.g. after a pod restart).
              # Delete the JAR manually to force a re-download on the next startup.
              if [ -f "${JAR}" ]; then
                echo "==> Server JAR already present, skipping download."
              else
                echo "==> Downloading {{ .Values.minecraft.jarUrl }}..."
                curl \
                  --silent --show-error --fail --location \
                  --retry 5 --retry-delay 5 \
                  --connect-timeout 30 --max-time 300 \
                  --output "${JAR}" \
                  "{{ .Values.minecraft.jarUrl }}"
                # Print checksum for auditability in pod logs
                echo "==> Download complete. SHA256: $(sha256sum ${JAR})"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        {{- end }}

        # Always: copy server.properties + write eula.txt
        # Both files are rewritten by the Minecraft server at runtime, so they
        # must live on the writable PVC – a read-only ConfigMap mount won't work.
        - name: init-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" false) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.configResources | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Copy server.properties from ConfigMap to the PVC on every start.
              # This ensures Helm value changes are applied even if the file already exists.
              echo "==> Syncing server.properties..."
              cp /config/server.properties /data/server.properties

              # Write eula.txt – Minecraft refuses to start without explicit EULA acceptance.
              echo "==> Writing eula.txt (eula={{ .Values.minecraft.eulaAccepted }})..."
              echo "eula={{ .Values.minecraft.eulaAccepted }}" > /data/eula.txt

              echo "==> Init done."
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true

      ##-- Main Container ##########################################───
      containers:
        - name: minecraft
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              FIFO="/tmp/mc-stdin"

              # Create a named pipe to allow writing commands into the server's stdin
              # (e.g. from the preStop hook). The FIFO persists in the shared /tmp emptyDir.
              echo "==> Creating command FIFO at ${FIFO}..."
              mkfifo "${FIFO}" 2>/dev/null || true

              {{- if .Values.neoforge.enabled }}
              # Start the NeoForge server via the generated run.sh script.
              # run.sh reads JVM args from /data/user_jvm_args.txt (mounted via subPath).
              echo "==> Starting NeoForge server via run.sh..."
              /bin/sh /data/run.sh < "${FIFO}" &
              {{- else }}
              # Start the vanilla Minecraft server directly with the configured JVM flags.
              echo "==> Starting Minecraft server..."
              java \
                {{ .Values.minecraft.jvmOpts }} \
                -jar "/data/{{ .Values.minecraft.jarFilename }}" \
                nogui < "${FIFO}" &
              {{- end }}

              MC_PID=$!

              # Keep fd 3 open so the FIFO never gets an EOF while the server is running.
              # Without this, the server would exit immediately after the first writer closes.
              exec 3>"${FIFO}"

              # Wait for the server process to exit and propagate its exit code
              wait ${MC_PID}
              EXIT_CODE=$?

              # Close fd 3 and exit with the server's exit code
              exec 3>&-
              exit ${EXIT_CODE}
          workingDir: /data
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Warn players about the upcoming shutdown via in-game chat
                    echo "say Kubernetes System: Shutdown scheduled in 10 seconds ..." > /tmp/mc-stdin
                    sleep 1

                    # Countdown from 9 to 1 with one-second intervals
                    i=9
                    while [ $i -gt 0 ]; do
                      echo "say Kubernetes System: $i" > /tmp/mc-stdin
                      sleep 1
                      i=$((i - 1))
                    done

                    # Send the stop command to trigger a clean server shutdown (world save etc.)
                    echo "stop" > /tmp/mc-stdin

                    # Wait for the remaining grace period so Kubernetes doesn't SIGKILL
                    # before the server finishes saving. (-10 accounts for the countdown above)
                    sleep {{ .Values.terminationGracePeriodSeconds | int | add -10 }}
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            {{- if .Values.rcon.enabled }}
            - name: rcon
              containerPort: {{ .Values.rcon.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.io.tmpdir=/tmp"
            {{- if .Values.rcon.enabled }}
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minecraft.rconSecretName" . }}
                  key: rcon-password
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- if .Values.neoforge.enabled }}
            # Mount JVM args directly into /data so NeoForge's run.sh can pick them up
            # via the @user_jvm_args.txt argument file reference
            - name: config
              mountPath: /data/user_jvm_args.txt
              subPath: user_jvm_args.txt
              readOnly: true
            {{- end }}

      ##-- Volumes ##########################################──────────
      volumes:
        - name: config
          configMap:
            name: {{ include "minecraft.fullname" . }}-config
            defaultMode: 0444
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

  ##-- Volume Claim Templates ##########################################
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "minecraft.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
  # Persistence disabled – data lives in an emptyDir (lost on pod restart!)
  {{- end }}