---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "minecraft.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "minecraft.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "minecraft.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
        checksum/scripts: {{ include (print $.Template.BasePath "/scripts.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "minecraft.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.securityContext.pod | nindent 8 }}

      ##-- Init Containers ##########################################
      initContainers:

        {{- if .Values.neoforge.enabled }}
        # NeoForge 1/2: Download installer
        - name: download-neoforge-installer
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" true) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
            - name: INSTALLER_URL
              value: {{ include "minecraft.neoforgeInstallerUrl" . | quote }}
          command: ["/bin/sh", "/scripts/download-neoforge-installer.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scripts
              mountPath: /scripts
              readOnly: true

        # NeoForge 2/2: Run installer
        - name: install-neoforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" false) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.installResources | nindent 12 }}
          env:
            - name: NEOFORGE_VERSION
              value: {{ .Values.neoforge.version | quote }}
          command: ["/bin/sh", "/scripts/install-neoforge.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: scripts
              mountPath: /scripts
              readOnly: true

        {{- else }}
        # Vanilla: download server.jar if not present
        - name: download-jar
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" true) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          command: ["/bin/sh", "/scripts/download-jar.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scripts
              mountPath: /scripts
              readOnly: true
        {{- end }}

        # Always: copy server.properties + write eula.txt
        # Both files are rewritten by the Minecraft server at runtime, so they
        # must live on the writable PVC – a read-only ConfigMap mount won't work.
        - name: init-config
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (dict "readOnlyRootFilesystem" false) .Values.securityContext.initContainer) | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainer.configResources | nindent 12 }}
          command: ["/bin/sh", "/scripts/init-config.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true

      ##-- Main Container ##########################################
      containers:
        - name: minecraft
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          command: ["/bin/sh", "/scripts/start-server.sh"]
          workingDir: /data
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "/scripts/stop.sh"]
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            {{- if .Values.rcon.enabled }}
            - name: rcon
              containerPort: {{ .Values.rcon.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.io.tmpdir=/tmp"
            {{- if .Values.rcon.enabled }}
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minecraft.rconSecretName" . }}
                  key: rcon-password
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: scripts
              mountPath: /scripts
              readOnly: true
            {{- if .Values.neoforge.enabled }}
            # Mount JVM args directly into /data so NeoForge's run.sh can pick them up
            # via the @user_jvm_args.txt argument file reference
            - name: config
              mountPath: /data/user_jvm_args.txt
              subPath: user_jvm_args.txt
              readOnly: true
            {{- end }}

      ##-- Volumes ##########################################
      volumes:
        - name: config
          configMap:
            name: {{ include "minecraft.fullname" . }}-config
            defaultMode: 0444
        - name: scripts
          configMap:
            name: {{ include "minecraft.fullname" . }}-scripts
            defaultMode: 0555
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

  ##-- Volume Claim Templates ##########################################
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "minecraft.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
  # Persistence disabled – data lives in an emptyDir (lost on pod restart!)
  {{- end }}
